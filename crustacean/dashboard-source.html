<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>InkThorn Crustacean — Partner Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: #0a0010; color: #f0f0ff; font-family: 'Space Grotesk', sans-serif; }

    /* ── Top Bar ── */
    .topbar {
      background: rgba(10,0,20,0.95);
      border-bottom: 1px solid rgba(168,85,247,0.2);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      position: -webkit-sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      overflow: visible;
    }
    .topbar-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: #f0f0ff;
      letter-spacing: 0.05em;
    }
    .topbar-logo span { color: #a855f7; }
    .topbar-subtitle { font-size: 0.72rem; color: #7878a8; font-family: monospace; margin-top: 2px; }
    .topbar-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid rgba(168,85,247,0.4);
      background: rgba(168,85,247,0.08);
      color: #a855f7;
    }

    /* ── Tab Nav ── */
    .dash-tabs {
      display: flex;
      gap: 6px;
      padding: 20px 28px 0;
      border-bottom: 1px solid rgba(168,85,247,0.15);
      overflow-x: auto;
    }
    .dash-tab {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 10px 18px;
      border-radius: 8px 8px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      color: #7878a8;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .dash-tab:hover { color: #a855f7; border-color: rgba(168,85,247,0.3); }
    .dash-tab.active {
      background: rgba(22,12,45,0.9);
      border-color: rgba(168,85,247,0.4);
      color: #f0f0ff;
    }

    /* ── Panels ── */
    .dash-panel { display: none; padding: 28px; }
    .dash-panel.active { display: block; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(22,12,45,0.7);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 12px;
      padding: 16px 24px;
      min-width: 140px;
    }
    .stat-label { font-size: 0.62rem; color: #7878a8; font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; }
    .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; margin-top: 4px; }

    /* ── Section header ── */
    .section-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(168,85,247,0.2);
      margin-bottom: 20px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .controls-left { display: flex; flex-direction: column; gap: 2px; }
    .controls-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    select.filter-select {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(22,12,45,0.9);
      color: inherit;
      cursor: pointer;
      outline: none;
    }
    input.search-input {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(22,12,45,0.9);
      color: #f0f0ff;
      outline: none;
      width: 200px;
    }
    a.csv-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 7px 16px;
      border-radius: 999px;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ── Table ── */
    .leads-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .leads-table thead tr { border-bottom: 2px solid; }
    .leads-table th {
      text-align: left;
      padding: 10px 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      white-space: nowrap;
    }
    .leads-table tbody tr {
      border-bottom: 1px solid rgba(168,85,247,0.1);
      transition: background 0.15s;
      cursor: pointer;
    }
    .leads-table td { padding: 10px 14px; }

    .empty-state { display: none; text-align: center; padding: 3rem; color: #7878a8; }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Map ── */
    .map-container { height: 420px; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .map-note { font-size: 0.72rem; color: #7878a8; font-family: monospace; margin-bottom: 28px; }
  
    /* ── Mobile nav ── */
    .nav-hamburger { display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:transparent;border:none; }
    .nav-hamburger span { display:block;width:22px;height:2px;background:#c4b5fd;border-radius:2px;transition:all 0.3s; }
    .nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .nav-hamburger.open span:nth-child(2){opacity:0;}
    .nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    ;
});
document.addEventListener('click',function(e){
  var nav=document.getElementById('mnav');
  var btn=document.getElementById('nav-btn');
  if(nav&&btn&&nav.classList.contains('nav-open')&&!nav.contains(e.target)&&e.target!==btn&&!btn.contains(e.target)){
    nav.classList.remove('nav-open');
    btn.classList.remove('is-open');
  }
});
</script>
<script>
document.getElementById('mnav').querySelectorAll('a').forEach(function(a){
  a.addEventListener('click',function(){
    document.getElementById('mnav').classList.remove('open');
    document.getElementById('nav-btn').textContent='☰';
  });
});
document.addEventListener('click',function(e){
  var m=document.getElementById('mnav'),b=document.getElementById('nav-btn');
  if(m.classList.contains('open')&&!m.contains(e.target)&&!b.contains(e.target)){
    m.classList.remove('open');
    b.textContent='☰';
  }
});
</script>
</body>
</html>
