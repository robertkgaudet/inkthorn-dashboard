<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>InkThorn Crustacean — Daily Call Scripts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: #06000f; color: #f0f0ff; font-family: 'Space Grotesk', sans-serif; }

    .topbar {
      background: rgba(10,0,20,0.97);
      border-bottom: 1px solid rgba(168,85,247,0.25);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky;
      position: -webkit-sticky; top: 0; z-index: 1000; position: sticky;
      backdrop-filter: blur(12px);
      overflow: visible;
    }
    .topbar-logo { font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:900;color:#f0f0ff; }
    .topbar-logo span { color:#a855f7; }
    .topbar-nav { display:flex;gap:14px;align-items:center;flex-wrap:wrap; }
    .topbar-nav a { font-size:0.75rem;color:#7878a8;text-decoration:none;font-weight:600; }
    .topbar-nav a:hover { color:#a855f7; }
    .topbar-nav a.active { color:#f0f0ff; }

    /* ── Daily Work Header ── */
    .work-header {
      background: linear-gradient(135deg, #0d001a, #160030);
      border-bottom: 2px solid rgba(168,85,247,0.3);
      padding: 28px 28px 24px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .work-header-left h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem; font-weight: 900; color: #f0f0ff; letter-spacing: 0.05em;
    }
    .work-header-left p { font-size: 0.82rem; color: #7878a8; margin-top: 4px; }
    .pitch-card {
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 10px; padding: 12px 20px;
      font-size: 0.82rem; color: #c4b5fd; font-style: italic;
      max-width: 500px; line-height: 1.6;
    }
    .pitch-card strong { color: #fbbf24; font-style: normal; }

    /* ── Script tabs ── */
    .script-tabs {
      display: flex; gap: 0;
      background: rgba(10,0,20,0.8);
      border-bottom: 1px solid rgba(168,85,247,0.2);
      overflow-x: auto;
      padding: 0 24px;
    }
    .script-tab {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.52rem; font-weight: 700; letter-spacing: 0.1em;
      padding: 14px 18px; border: none; background: transparent;
      color: #7878a8; cursor: pointer; white-space: nowrap;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .script-tab:hover { color: #c4b5fd; }
    .script-tab.active { color: #f0f0ff; border-bottom-color: #a855f7; }

    /* ── Content ── */
    .script-content { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Script boxes ── */
    .situation-label {
      display: inline-block;
      font-family: 'Orbitron', sans-serif; font-size: 0.45rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 999px; margin-bottom: 20px;
    }

    .script {
      background: rgba(10,0,20,0.9);
      border-left: 4px solid #a855f7;
      border-radius: 0 12px 12px 0;
      padding: 22px 26px;
      margin-bottom: 20px;
    }
    .script-label {
      font-family: 'Orbitron', sans-serif; font-size: 0.44rem; font-weight: 700;
      letter-spacing: 0.18em; color: #a855f7; margin-bottom: 12px;
    }
    .script-text { font-size: 0.95rem; color: #e0e0ff; line-height: 1.9; }
    .script-text strong { color: #fbbf24; }
    .script-text em { color: #7878a8; font-style: normal; font-size:0.82rem; }
    .script-note {
      margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(168,85,247,0.15);
      font-size: 0.78rem; color: #7878a8; line-height: 1.6;
    }
    .script-note strong { color: #c4b5fd; }

    .response { background: rgba(22,12,45,0.7); border-left: 4px solid #4ade80; border-radius: 0 10px 10px 0; padding: 16px 20px; margin: 12px 0; }
    .response-label { font-family:'Orbitron',sans-serif;font-size:0.44rem;font-weight:700;letter-spacing:0.15em;color:#4ade80;margin-bottom:8px; }
    .response-text { font-size:0.9rem;color:#c4b5fd;line-height:1.8; }
    .response-text strong { color:#fbbf24; }

    /* ── Objection mini-cards ── */
    .obj { background:rgba(22,12,45,0.8);border:1px solid rgba(168,85,247,0.15);border-radius:10px;padding:16px 20px;margin-bottom:10px; }
    .obj-q { font-weight:700;color:#ff6b6b;font-size:0.88rem;margin-bottom:6px; }
    .obj-a { font-size:0.86rem;color:#c4b5fd;line-height:1.7; }
    .obj-a strong { color:#fbbf24; }

    /* ── Cheat sheet ── */
    .cheat { background:rgba(10,0,20,0.95);border:2px solid rgba(168,85,247,0.4);border-radius:14px;padding:24px 28px; }
    .cheat-row { display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid rgba(168,85,247,0.1);font-size:0.85rem; }
    .cheat-row:last-child { border-bottom:none; }
    .cheat-label { color:#7878a8; }
    .cheat-val { color:#f0f0ff;font-weight:700;text-align:right; }
    .cheat-val.green { color:#4ade80; }
    .cheat-val.gold { color:#fbbf24; }
    .cheat-val.purple { color:#c4b5fd; }
  
    .nav-hamburger { display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:transparent;border:none; }
    .nav-hamburger span { display:block;width:22px;height:2px;background:#c4b5fd;border-radius:2px;transition:all 0.3s; }
    .nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .nav-hamburger.open span:nth-child(2){opacity:0;}
    .nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    ;
});
document.addEventListener('click',function(e){
  var nav=document.getElementById('mnav');
  var btn=document.getElementById('nav-btn');
  if(nav&&btn&&nav.classList.contains('nav-open')&&!nav.contains(e.target)&&e.target!==btn&&!btn.contains(e.target)){
    nav.classList.remove('nav-open');
    btn.classList.remove('is-open');
  }
});
</script>
<script>
document.getElementById('mnav').querySelectorAll('a').forEach(function(a){
  a.addEventListener('click',function(){
    document.getElementById('mnav').classList.remove('open');
    document.getElementById('nav-btn').textContent='☰';
  });
});
document.addEventListener('click',function(e){
  var m=document.getElementById('mnav'),b=document.getElementById('nav-btn');
  if(m.classList.contains('open')&&!m.contains(e.target)&&!b.contains(e.target)){
    m.classList.remove('open');
    b.textContent='☰';
  }
});
</script>
</body>
</html>
