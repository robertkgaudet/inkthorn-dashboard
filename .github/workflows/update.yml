name: Update Dashboard Data
on:
  schedule:
    - cron: '0 13 * * *'  # 8 AM CDT (UTC-5)
    - cron: '0 23 * * *'  # 6 PM CDT (UTC-5)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (YYYY-MM-DD, default: today)'
        required: false
        default: ''

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Scrape WWOZ Live Music
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          node scripts/scrape-wwoz.js $DATE_ARG

      - name: Scrape 504Comedy Events
        run: node scripts/scrape-504comedy.js

      - name: Fetch Weather
        run: node scripts/fetch-weather.js
      
      - name: Encrypt Playbook
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          yes | npx staticrypt playbook-source.html -p "$STATICRYPT_PASSWORD" --short || true
          cp encrypted/playbook-source.html playbook.html

      - name: Commit updated data
        run: |
          git config user.name "InkThorn Bot"
          git config user.email "inkthorn-bot@users.noreply.github.com"
          git add data/ playbook.html
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci] $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
