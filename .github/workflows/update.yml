name: Update Dashboard Data

on:
  schedule:
    # 8:00 AM CDT = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (YYYY-MM-DD, default: today)'
        required: false
        default: ''

jobs:
  update-data:
    name: Scrape WWOZ & Commit Data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.date }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_DATE=$(TZ='America/Chicago' date +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi
          echo "Using date: $TARGET_DATE"

      - name: Scrape WWOZ Livewire
        run: |
          echo "Scraping WWOZ for $TARGET_DATE..."
          node scripts/scrape-wwoz.js --date "$TARGET_DATE"

      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push data updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name  "InkThorn Bot"
          git config --global user.email "inkthorn-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore(data): update live-music for $TARGET_DATE [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No data changes to commit."
