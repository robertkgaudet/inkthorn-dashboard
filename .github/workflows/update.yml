name: Update Dashboard Data
on:
  schedule:
    - cron: '0 13 * * *'  # 8 AM CDT (UTC-5)
    - cron: '0 23 * * *'  # 6 PM CDT (UTC-5)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (YYYY-MM-DD, default: today)'
        required: false
        default: ''

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Scrape WWOZ Live Music
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          node scripts/scrape-wwoz.js $DATE_ARG

      - name: Scrape 504Comedy Events
        run: node scripts/scrape-504comedy.js

      - name: Fetch Weather
        run: node scripts/fetch-weather.js
      
      - name: Encrypt Playbook
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          yes | npx staticrypt playbook-source.html -p "$STATICRYPT_PASSWORD" --short || true
          cp encrypted/playbook-source.html playbook.html

      - name: Encrypt Partner Dashboard
        env:
          PARTNER_PASSWORD: ${{ secrets.PARTNER_DASHBOARD_PASSWORD }}
        run: |
          yes | npx staticrypt crustacean/dashboard-source.html -p "$PARTNER_PASSWORD" --short || true
          cp encrypted/dashboard-source.html crustacean/dashboard.html

      - name: Encrypt Admin Panel
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          # Inject real Supabase credentials before encrypting (use publishable key - safe for browser)
          sed "s|SUPABASE_URL_PLACEHOLDER|$SUPABASE_URL|g; s|SUPABASE_SERVICE_KEY_PLACEHOLDER|$SUPABASE_PUBLISHABLE_KEY|g" \
            crustacean/admin-source.html > /tmp/admin-injected.html
          yes | npx staticrypt /tmp/admin-injected.html -p "$ADMIN_PASSWORD" --short || true
          cp encrypted/admin-injected.html crustacean/admin.html

      - name: Commit updated data
        run: |
          git config user.name "InkThorn Bot"
          git config user.email "inkthorn-bot@users.noreply.github.com"
          git add data/ playbook.html crustacean/dashboard.html crustacean/admin.html
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci] $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
