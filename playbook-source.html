<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>InkThorn — Daily Playbook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="pragma" content="no-cache" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    body {
      background: #070711;
      color: #e0e0ff;
      font-family: 'Rajdhani', sans-serif;
      margin: 0;
      padding: 0;
    }
    .playbook-standalone {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .playbook-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: #ff2d87;
      text-shadow: 0 0 18px rgba(255,45,135,0.7);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .playbook-subtitle {
      color: #9090c0;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    #playbook-content .no-data-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem;
      color: #5a5a8a;
    }
    #playbook-content .no-data-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }
    .loading-pulse {
      text-align: center;
      color: #5a5a8a;
      padding: 3rem;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="playbook-standalone">
    <div class="playbook-logo">INKTHORN</div>
    <div class="playbook-subtitle">📋 DAILY PLAYBOOK</div>
    <div id="playbook-content">
      <div class="loading-pulse">Loading playbook…</div>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    (async function () {
      const el = document.getElementById('playbook-content');
      try {
        const res = await fetch('data/playbook.json?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderPlaybook(data, el);
      } catch (err) {
        el.innerHTML = '<div class="no-data-card"><span class="no-data-icon">⚠️</span><p>Failed to load playbook data.</p></div>';
      }
    })();
  </script>
</body>
</html>
